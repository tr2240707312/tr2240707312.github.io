<!DOCTYPE html>
<html>
<body>

<p id="demo">页面加载中...</p>

<script>
// 页面加载完成后自动执行
document.addEventListener('DOMContentLoaded', function() {
  generateTimestampString();
});

function generateTimestampString() {
  document.getElementById("demo").innerHTML ="7072715" + Math.floor(Date.now() / 10000) + "0000";
}
</script>

</body>
</html>
